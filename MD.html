<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeri Foto Lokal - YBCI</title>
    <style>
        :root {
            --bg: #121212;
            --card-bg: #1e1e1e;
            --accent: #3498db;
            --text: #ffffff;
        }

        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        
        header { position: sticky; top: 0; background: var(--bg); padding: 10px 0 20px 0; z-index: 50; text-align: center; }
        h1 { font-weight: 300; margin-bottom: 20px; }
        
        .search-container { max-width: 500px; margin: 0 auto; position: relative; }
        #searchInput {
            width: 100%;
            padding: 12px 20px;
            border-radius: 25px;
            border: 1px solid #444;
            background: #222;
            color: white;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
            box-sizing: border-box;
        }
        #searchInput:focus { border-color: var(--accent); box-shadow: 0 0 8px rgba(52, 152, 219, 0.4); }

        .gallery { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); 
            gap: 15px; 
            max-width: 1100px; 
            margin: 20px auto; 
        }
        
        .card { 
            background: var(--card-bg); 
            border-radius: 12px; 
            overflow: hidden; 
            transition: 0.3s; 
            cursor: pointer; 
            border: 1px solid #333;
            animation: fadeIn 0.5s ease;
        }
        .card:hover { transform: translateY(-5px); border-color: var(--accent); }
        
        img { width: 100%; height: 160px; object-fit: cover; display: block; background: #222; }
        .card p { font-size: 13px; padding: 12px; margin: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; text-transform: capitalize; }

        #modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.9); justify-content:center; align-items:center; z-index:1000; cursor: zoom-out; }
        #modal img { max-width: 90%; max-height: 90%; object-fit: contain; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <header>
        <h1>Merchandise</h1>
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Cari produk..." onkeyup="filterPhotos()">
        </div>
    </header>

    <div id="gallery" class="gallery"></div>

    <div id="modal" onclick="this.style.display='none'">
        <img id="fullImg">
    </div>

    <script>
        // 1. Daftar gambar manual dari folder lokal
        const allPhotos = [
            { name: "Rompi", src: "images/barber/rompi.png" },
            { name: "Topi", src: "images/barber/topi.png" },
            { name: "Tumbler", src: "images/barber/tumbler.png" },
            { name: "Jaket", src: "images/barber/jaket.png" },
            { name: "Lanyard", src: "images/barber/lanyard.png" },
            { name: "Kaos", src: "images/barber/kaos.png" }
        ];

        function displayPhotos(photos) {
            const gallery = document.getElementById('gallery');
            gallery.innerHTML = ''; 

            if (photos.length === 0) {
                gallery.innerHTML = '<p style="grid-column: 1/-1; color: #888; text-align:center;">Produk tidak ditemukan.</p>';
                return;
            }

            photos.forEach(photo => {
                const div = document.createElement('div');
                div.className = 'card';
                div.onclick = () => {
                    document.getElementById('modal').style.display = 'flex';
                    document.getElementById('fullImg').src = photo.src;
                };
                div.innerHTML = `
                    <img src="${photo.src}" alt="${photo.name}" loading="lazy">
                    <p>${photo.name}</p>
                `;
                gallery.appendChild(div);
            });
        }

        function filterPhotos() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allPhotos.filter(photo => 
                photo.name.toLowerCase().includes(searchTerm)
            );
            displayPhotos(filtered);
        }

        // Jalankan fungsi saat halaman dimuat
        window.onload = () => displayPhotos(allPhotos);
    </script>
</body>
</html>
