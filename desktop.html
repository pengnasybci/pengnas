<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Yaris Bapao Club Indonesia</title>
<!-- Favicon -->
    <link rel="icon" type="image/png" href="images/ybci2.png">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Font & Icon -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
:root{
  --green:#22c55e;
  --green-dark:#16a34a;
  --neon:#4ade80;
  --dark:#0f172a;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background:
    radial-gradient(circle at top left,#bbf7d0,transparent 40%),
    radial-gradient(circle at bottom right,#99f6e4,transparent 40%),
    linear-gradient(135deg,#ecfeff,#f0fdf4);
  min-height:100vh;
}

/* ===== DASHBOARD ===== */
.dashboard{
  max-width:1250px;
  margin:50px auto;
  padding:25px;
}

.dashboard h1{
  font-size:34px;
  font-weight:700;
  color:var(--dark);
}

.subtitle{
  color:#475569;
  margin-bottom:40px;
}

/* ===== GRID ===== */
.menu-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:26px;
}

.menu-link{
  text-decoration:none;
}

/* ===== CARD ===== */
.menu-box{
  position:relative;
  background:rgba(255,255,255,0.65);
  backdrop-filter:blur(14px);
  border-radius:22px;
  padding:34px 24px;
  text-align:center;
  box-shadow:
    inset 0 0 0 1px rgba(255,255,255,0.5),
    0 20px 40px rgba(0,0,0,0.12);
  transition:.45s cubic-bezier(.4,0,.2,1);
  overflow:hidden;
}

/* Neon glow */
.menu-box::after{
  content:"";
  position:absolute;
  inset:-2px;
  background:linear-gradient(135deg,transparent,rgba(74,222,128,.35),transparent);
  opacity:0;
  transition:.45s;
}

.menu-box:hover::after{
  opacity:1;
}

/* Hover motion */
.menu-box:hover{
  transform:translateY(-12px) scale(1.04);
  box-shadow:
    0 30px 60px rgba(34,197,94,.35),
    0 0 25px rgba(74,222,128,.35);
}

/* ICON */
.menu-box i{
  font-size:42px;
  margin-bottom:16px;
  background:linear-gradient(135deg,var(--green),var(--green-dark));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  animation:float 4s ease-in-out infinite;
}

@keyframes float{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-6px)}
}

/* TITLE */
.menu-box h3{
  margin:0;
  font-size:19px;
  font-weight:600;
  color:#020617;
}

/* DESC */
.menu-box p{
  margin-top:6px;
  font-size:13px;
  color:#64748b;
}

/* BADGE */
.badge{
  position:absolute;
  top:14px;
  right:-40px;
  background:linear-gradient(135deg,#facc15,#f97316);
  color:#1c1917;
  font-size:11px;
  padding:6px 50px;
  font-weight:700;
  transform:rotate(35deg);
  box-shadow:0 6px 18px rgba(0,0,0,.25);
}

/* ===== RESPONSIVE ===== */
@media(max-width:1100px){
  .menu-grid{grid-template-columns:repeat(3,1fr)}
}
@media(max-width:768px){
  .menu-grid{grid-template-columns:repeat(2,1fr)}
  .dashboard h1{font-size:26px}
}
@media(max-width:420px){
  .menu-grid{grid-template-columns:1fr}
}
</style>
</head>

<body>

<div class="dashboard">

  <div class="menu-grid">

</a>

</html>
