<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saran & Masukan - YBCI</title>
    <style>
        /* Variabel Warna */
        :root {
            --primary-red: #e74c3c;
            --dark-red: #c0392b;
            --bg-black: #0d0d0d;
            --card-black: #1a1a1a;
            --text-white: #ffffff;
            --text-gray: #b3b3b3;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-black);
            background-image: radial-gradient(circle at top right, #2c0000, transparent);
            color: var(--text-white);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: var(--card-black);
            padding: 40px;
            border-radius: 20px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.7);
            border: 1px solid #333;
            position: relative;
            overflow: hidden;
        }

        /* Dekorasi Garis Merah di Atas */
        .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 5px;
            background: linear-gradient(90deg, var(--primary-red), var(--dark-red));
        }

        h2 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 30px;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-white);
        }

        h2 span {
            color: var(--primary-red);
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            color: var(--text-gray);
            transition: 0.3s;
        }

        input, textarea {
            width: 100%;
            padding: 14px 16px;
            border-radius: 10px;
            border: 2px solid #2a2a2a;
            background: #222;
            color: white;
            font-size: 15px;
            box-sizing: border-box;
            outline: none;
            transition: all 0.3s ease;
        }

        input:focus, textarea:focus {
            border-color: var(--primary-red);
            background: #282828;
            box-shadow: 0 0 10px rgba(231, 76, 60, 0.2);
        }

        /* Animasi Label saat Input Fokus */
        .form-group:focus-within label {
            color: var(--primary-red);
        }

        button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--primary-red), var(--dark-red));
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 16px;
            font-weight: 800;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s transform;
            margin-top: 10px;
            box-shadow: 0 4px 15px rgba(231, 76, 60, 0.4);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(231, 76, 60, 0.6);
            background: linear-gradient(135deg, #ff5e4d, var(--primary-red));
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            background: #555;
            cursor: not-allowed;
            box-shadow: none;
        }

        #status {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            font-weight: 500;
            min-height: 20px;
        }

        /* Responsif Mobile */
        @media (max-width: 480px) {
            .container {
                padding: 25px;
            }
            h2 {
                font-size: 22px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Saran <span>&</span> Masukan</h2>
    <form id="saranForm">
        <div class="form-group">
            <label>Nama Lengkap</label>
            <input type="text" name="nama" required placeholder="Masukkan nama sesuai identitas">
        </div>
        
        <div class="form-group">
            <label>NRA (Registrasi Anggota)</label>
            <input type="text" name="nra" required placeholder="Contoh: 026">
        </div>

        <div class="form-group">
            <label>No. Whatsapp</label>
            <input type="tel" name="whatsapp" required placeholder="08XXXXXXXXXX">
        </div>

        <div class="form-group">
            <label>Pesan Anda</label>
            <textarea name="pesan" rows="4" required placeholder="Sampaikan saran atau keluhan Anda..."></textarea>
        </div>

        <button type="submit" id="submitBtn">Kirim Sekarang</button>
    </form>
    <div id="status"></div>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbwE2wwp2IPEc0cXmNazIBR-sDLsEN6SGLKKzdlvqXGvfykmsgyT2a8bl_BQ-XyhnwE4/exec';
    const form = document.getElementById('saranForm');
    const statusTxt = document.getElementById('status');
    const btn = document.getElementById('submitBtn');

    form.addEventListener('submit', e => {
        e.preventDefault();
        btn.disabled = true;
        btn.innerText = "MENGIRIM...";
        statusTxt.innerText = "Mohon tunggu sebentar...";
        statusTxt.style.color = "#888";
        
        fetch(scriptURL, { method: 'POST', body: new FormData(form)})
            .then(response => {
                statusTxt.innerText = "BERHASIL! Data telah kami terima.";
                statusTxt.style.color = "#2ecc71";
                form.reset();
                btn.disabled = false;
                btn.innerText = "KIRIM SEKARANG";
            })
            .catch(error => {
                statusTxt.innerText = "ERROR! Gagal terhubung ke server.";
                statusTxt.style.color = "#e74c3c";
                btn.disabled = false;
                btn.innerText = "KIRIM SEKARANG";
            });
    });
</script>

</body>
</html>
