<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pengnas YBCI</title>

    <link rel="icon" href="images/ybci2.png">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">

    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&family=Poppins:wght@600&display=swap" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Roboto', sans-serif;
            background: #121212;
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* SPLASH SCREEN */
        #splash {
            position: fixed;
            inset: 0;
            background: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease;
        }
        #splash img { width: 120px; animation: zoom 1.2s; }
        #splash h3 { margin-top: 10px; font-weight: 500; font-family: 'Poppins', sans-serif; }
        @keyframes zoom { from { transform: scale(.6); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        /* HEADER & DATE */
        .datetime-container {
            width: 90%;
            max-width: 500px;
            margin: 20px auto 10px;
            background: #1e1e1e;
            padding: 14px 16px;
            border-radius: 20px;
            box-shadow: 0 6px 18px rgba(0,0,0,.7);
            opacity: 0;
            animation: fadeIn 0.8s forwards 1s;
        }
        .datetime { font-size: 13px; color: #bbb; }
        .greeting { font-size: 18px; font-weight: 600; margin-top: 4px; color: #fff; }

        /* SLIDER */
        .slider-container {
            width: 90%;
            max-width: 500px;
            height: 200px;
            margin: 10px auto 20px;
            border-radius: 22px;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0,0,0,.8);
            position: relative;
            background: #1a1a1a; /* Background jika gambar gagal muat */
            opacity: 0;
            animation: fadeIn 0.8s forwards 0.5s;
        }
        .slides {
            display: flex;
            height: 100%;
            width: 100%;
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .slide {
            min-width: 100%;
            height: 100%;
            overflow: hidden;
            position: relative;
            transform: scale(0.96);
            transition: transform 0.8s ease;
        }
        .slide.active { transform: scale(1); }
        .slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            border-radius: 22px;
        }

        /* DOTS */
        .dots {
            position: absolute;
            bottom: 12px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
            z-index: 10;
        }
        .dot {
            width: 8px; height: 8px; border-radius: 50%;
            background: rgba(255,255,255,.3);
            transition: all 0.3s ease;
        }
        .dot.active {
            background: #fff;
            width: 20px;
            border-radius: 10px;
        }

        /* MENU GRID */
        .grid {
            width: 90%;
            max-width: 500px;
            margin: 0 auto 20px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 14px;
        }
        .top-menu { opacity: 0; animation: fadeInUp 0.8s forwards 1.2s; }
        .bottom-menu { opacity: 0; animation: fadeInUp 0.8s forwards 1.4s; margin-bottom: 100px; }

        .menu-item {
            background: #1f1f1f;
            border-radius: 20px;
            padding: 16px 10px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,.6);
            transition: transform 0.2s, background 0.2s;
            cursor: pointer;
        }
        .menu-item:active { transform: scale(.92); background: #252525; }
        .menu-icon img { width: 35px; height: 35px; }
        .menu-label { font-size: 12px; margin-top: 8px; font-weight: 500; color: #ddd; }

        /* BOTTOM NAV */
        .bottom-nav {
            position: fixed;
            bottom: 0; left: 0; width: 100%;
            height: 70px;
            background: #1c1c1c;
            display: flex;
            justify-content: space-around;
            align-items: center;
            box-shadow: 0 -4px 20px rgba(0,0,0,.8);
            z-index: 1000;
        }
        .nav-item { display: flex; flex-direction: column; align-items: center; font-size: 11px; color: #777; text-decoration: none; }
        .nav-item img { filter: invert(0.5); width: 22px; margin-bottom: 4px; }
        .nav-item.active { color: #fff; }
        .nav-item.active img { filter: invert(1); }

        /* REFRESH */
        #pullRefresh {
            position: fixed; top: -50px; left: 50%; transform: translateX(-50%);
            background: #1e1e1e; padding: 8px 16px; border-radius: 20px;
            font-size: 12px; transition: .3s; z-index: 2000; border: 1px solid #333;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div id="splash">
        <img src="images/ybci2.png" alt="Logo">
        <h3>Pengnas YBCI</h3>
    </div>

    <div id="pullRefresh">↻ Lepaskan untuk Refresh</div>

    <div class="datetime-container">
        <div class="datetime" id="datetime">Memuat waktu...</div>
        <div class="greeting">Bravo YBCI</div>
    </div>

    <div class="slider-container">
        <div class="slides" id="slides">
            <div class="slide active"><img src="images/services/slide1.jpeg"></div>
            <div class="slide"><img src="images/services/slide2.jpeg"></div>
            <div class="slide"><img src="images/services/slide3.jpeg"></div>
        </div>
        <div class="dots" id="dotsContainer">
            <div class="dot active"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>
    </div>

    <div class="grid top-menu">
        <div class="menu-item" onclick="location.href='index.html'">
            <div class="menu-icon"><img src="https://img.icons8.com/color/48/home.png"></div>
            <div class="menu-label">Web</div>
        </div>
        <div class="menu-item" onclick="location.href='member.html'">
            <div class="menu-icon"><img src="https://img.icons8.com/color/48/user-group-man-man.png"></div>
            <div class="menu-label">Member</div>
        </div>
        <div class="menu-item" onclick="location.href='galeri.html'">
            <div class="menu-icon"><img src="https://img.icons8.com/color/48/camera.png"></div>
            <div class="menu-label">Galeri</div>
        </div>
    </div>

    <div class="grid bottom-menu">
        <div class="menu-item" onclick="location.href='informasi.html'">
            <div class="menu-icon"><img src="https://img.icons8.com/color/48/chat.png"></div>
            <div class="menu-label">Informasi</div>
        </div>
        <div class="menu-item" onclick="location.href='MD.html'">
            <div class="menu-icon"><img src="https://img.icons8.com/color/48/t-shirt.png"></div>
            <div class="menu-label">Merchandise</div>
        </div>
        <div class="menu-item" onclick="location.href='partner.html'">
    <div class="menu-icon"><img src="https://img.icons8.com/color/48/handshake.png"></div>
    <div class="menu-label">Partner</div>
</div>
        <div class="menu-item" onclick="location.href='SOS.html'">
            <div class="menu-icon">
                <svg viewBox="0 0 64 64" width="35" height="35"><rect x="8" y="12" width="48" height="40" rx="6" fill="#e74c3c"/><path d="M16 22h32v4H16zm0 8h32v4H16zm0 8h18v4H16" fill="#fff"/></svg>
            </div>
            <div class="menu-label">Kontak Pengda</div>
        </div>
        <div class="menu-item" onclick="location.href='kalender.html'">
            <div class="menu-icon"><img src="https://img.icons8.com/color/48/calendar.png"></div>
            <div class="menu-label">Kalender</div>
        </div>
        <div class="menu-item" onclick="location.href='saran.html'">
            <div class="menu-icon"><img src="https://img.icons8.com/color/48/star.png"></div>
            <div class="menu-label">Saran dan masukan</div>
        </div>
    </div>

    <div class="bottom-nav">
        <a href="#" class="nav-item active"><img src="https://img.icons8.com/ios-filled/50/home.png"><span>Home</span></a>
        <a href="Berita.html" class="nav-item"><img src="https://img.icons8.com/ios-filled/50/news.png"><span>Berita</span></a>
        <a href="kalender.html" class="nav-item"><img src="https://img.icons8.com/ios-filled/50/calendar.png"><span>Agenda</span></a>
        <a href="#" class="nav-item"><img src="https://img.icons8.com/ios-filled/50/user.png"><span>Profil</span></a>
    </div>

    <script>
        // SPLASH
        window.addEventListener('load', () => {
            setTimeout(() => {
                const splash = document.getElementById('splash');
                splash.style.opacity = '0';
                setTimeout(() => splash.style.display = 'none', 500);
            }, 1000);
        });

        // DATE
        function updateTime() {
            const d = new Date();
            const options = { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' };
            document.getElementById('datetime').innerHTML = d.toLocaleDateString('id-ID', options) + " | " + d.toLocaleTimeString('id-ID');
        }
        setInterval(updateTime, 1000);
        updateTime();

        // SLIDER - Perbaikan Logika Inisialisasi
        let currentIndex = 0;
        const slidesContainer = document.getElementById('slides');
        const slides = document.querySelectorAll('.slide');
        const dots = document.querySelectorAll('.dot');

        function goToSlide(index) {
            if(!slidesContainer) return;
            slidesContainer.style.transform = `translateX(-${index * 100}%)`;
            slides.forEach((s, i) => s.classList.toggle('active', i === index));
            dots.forEach((d, i) => d.classList.toggle('active', i === index));
        }

        // Jalankan slide otomatis
        let slideInterval = setInterval(() => {
            currentIndex = (currentIndex + 1) % slides.length;
            goToSlide(currentIndex);
        }, 4000);

        // PULL TO REFRESH
        let startY = 0;
        const refreshIndicator = document.getElementById('pullRefresh');
        document.addEventListener('touchstart', e => { startY = e.touches[0].pageY; });
        document.addEventListener('touchmove', e => {
            const y = e.touches[0].pageY;
            if (window.scrollY === 0 && y - startY > 120) {
                refreshIndicator.style.top = '20px';
            }
        });
        document.addEventListener('touchend', () => {
            if (parseInt(refreshIndicator.style.top) > 0) {
                location.reload();
            }
        });
    </script>
</body>
</html>
