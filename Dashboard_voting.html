<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Real-Time</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;800&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #000; color: #fff; }
    .progress-bar { transition: width 1.5s cubic-bezier(0.4, 0, 0.2, 1); }
    .stat-value { transition: all 0.3s ease; }
    .glass { background: rgba(24, 24, 27, 0.85); backdrop-filter: blur(10px); }
    /* Menghilangkan seleksi biru saat klik */
    * { -webkit-tap-highlight-color: transparent; }
  </style>
</head>
<body class="antialiased min-h-screen relative">
  
  <div id="passwordOverlay" class="fixed inset-0 z-[100] bg-black flex items-center justify-center p-6">
    <div class="max-w-xs w-full text-center">
      <h2 class="text-xl font-800 tracking-tighter uppercase mb-6">RESTRICTED <span class="text-red-600">ACCESS</span></h2>
      <input type="password" id="passInput" 
        class="w-full bg-zinc-900 border border-zinc-800 rounded-2xl p-4 text-center text-lg font-bold tracking-widest focus:border-red-600 outline-none transition-all mb-4" 
        placeholder="ENTER PASSWORD">
      <button onclick="checkPassword()" 
        class="w-full bg-red-600 text-white font-bold py-4 rounded-2xl hover:bg-red-700 active:scale-95 transition-all">
        UNLOCK DASHBOARD
      </button>
      <p id="errorMsg" class="text-red-500 text-[10px] font-bold mt-4 uppercase hidden">Password Salah!</p>
    </div>
  </div>

  <div id="mainContent" class="p-6 hidden">
    <div class="max-w-md mx-auto">
      <header class="mb-10 text-center">
        <h1 class="text-3xl font-800 tracking-tighter uppercase mb-2">HASIL <span class="text-red-600">SUARA</span></h1>
        <div class="inline-block px-4 py-1 rounded-full bg-zinc-900 border border-zinc-800 text-[10px] font-bold tracking-[0.2em] text-zinc-500">
          YARIS BAPAO CLUB INDONESIA
        </div>
      </header>

      <div class="grid grid-cols-2 gap-4 mb-10">
        <div class="bg-zinc-900 border border-zinc-800 p-6 rounded-[2rem] text-center shadow-xl">
          <p class="text-[10px] font-bold text-zinc-500 uppercase tracking-widest mb-2">Total DPT</p>
          <span id="totalDPT" class="stat-value text-4xl font-800 tracking-tighter text-white">-</span>
        </div>
        <div class="bg-zinc-900 border border-zinc-800 p-6 rounded-[2rem] text-center border-l-4 border-l-red-600 shadow-xl">
          <p class="text-[10px] font-bold text-zinc-500 uppercase tracking-widest mb-2">Masuk</p>
          <span id="sudahMemilih" class="stat-value text-4xl font-800 tracking-tighter text-red-600">-</span>
        </div>
      </div>

      <div class="space-y-6">
        <div class="flex justify-between items-center mb-2">
          <h3 class="text-[10px] font-black tracking-[0.3em] text-zinc-600 uppercase font-mono">Perolehan Kandidat</h3>
          <div id="syncIndicator" class="h-1 w-1 rounded-full bg-red-600 animate-pulse"></div>
        </div>
        <div id="chartContainer" class="space-y-8">
          <div class="text-center py-10 text-zinc-700 text-xs italic">Menghubungkan ke server...</div>
        </div>
      </div>

      <footer class="mt-20 text-center">
        <p class="text-[9px] text-zinc-600 font-bold uppercase tracking-widest">Pembaruan Otomatis Setiap 5 Detik</p>
      </footer>
    </div>
  </div>

  <script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbz2K3ON1sy8poggCRvb4mrgHKis6nw_TY_CNUjUV-1B11LkK23CpfBQUl3IamvlgUrzBg/exec";
    const SECRET_PASS = "Pengnas";

    function checkPassword() {
      const input = document.getElementById('passInput').value;
      const overlay = document.getElementById('passwordOverlay');
      const content = document.getElementById('mainContent');
      const error = document.getElementById('errorMsg');

      if (input === SECRET_PASS) {
        overlay.classList.add('hidden');
        content.classList.remove('hidden');
        refreshStats(); // Mulai ambil data setelah login berhasil
        setInterval(refreshStats, 5000); // Mulai interval auto-refresh
      } else {
        error.classList.remove('hidden');
        document.getElementById('passInput').value = "";
      }
    }

    // Izinkan tekan "Enter" untuk submit password
    document.getElementById('passInput').addEventListener('keypress', function (e) {
      if (e.key === 'Enter') checkPassword();
    });

    async function refreshStats() {
      document.getElementById('syncIndicator').classList.add('opacity-100');
      try {
        const response = await fetch(WEB_APP_URL, {
          method: 'POST',
          body: JSON.stringify({ action: 'getStats' })
        });
        const res = await response.json();
        if (res.status === 'success') {
          drawDashboard(res.data);
        }
      } catch (err) {
        console.error("Gagal mengambil data:", err);
      } finally {
        setTimeout(() => {
          document.getElementById('syncIndicator').classList.remove('opacity-100');
        }, 500);
      }
    }

    function drawDashboard(data) {
      document.getElementById('totalDPT').innerText = data.totalDPT;
      document.getElementById('sudahMemilih').innerText = data.sudahMemilih;
      const container = document.getElementById('chartContainer');
      container.innerHTML = "";
      const sortedKandidat = Object.entries(data.perolehan).sort((a, b) => b[1] - a[1]);

      for (const [nama, jumlah] of sortedKandidat) {
        const persen = data.sudahMemilih > 0 ? (jumlah / data.sudahMemilih * 100).toFixed(1) : 0;
        container.innerHTML += `
          <div class="animate-in fade-in slide-in-from-bottom-2 duration-700">
            <div class="flex justify-between items-end mb-2">
              <div>
                <p class="text-lg font-bold uppercase leading-none tracking-tight">${nama}</p>
                <p class="text-[10px] text-zinc-500 font-mono mt-1 tracking-wider">${jumlah} SUARA TERVERIFIKASI</p>
              </div>
              <span class="text-2xl font-800 text-red-600 font-mono">${persen}%</span>
            </div>
            <div class="w-full h-3 bg-zinc-900 rounded-full overflow-hidden border border-zinc-800">
              <div class="progress-bar h-full bg-gradient-to-r from-red-900 via-red-600 to-red-500 rounded-full" 
                   style="width: ${persen}%">
              </div>
            </div>
          </div>
        `;
      }
    }
  </script>
</body>
</html>
